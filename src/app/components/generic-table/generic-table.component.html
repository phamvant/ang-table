<!-- generic-table.component.html -->
<div class="table-container">
  
  <!-- Toolbar -->
  <div class="table-toolbar">
    <div class="toolbar-left">
      <ng-content select="[toolbar-left]"></ng-content>
      <span class="change-badge" *ngIf="dirtyCount > 0">
        {{ dirtyCount }} unsaved change{{ dirtyCount > 1 ? 's' : '' }}
      </span>
    </div>
    
    <div class="toolbar-right">
      <ng-content select="[toolbar-right]"></ng-content>
      
      <button mat-stroked-button
              (click)="cancelAll()"
              [disabled]="dirtyCount === 0">
        <mat-icon>cancel</mat-icon>
        Cancel
      </button>
      
      <button mat-raised-button
              color="primary"
              (click)="saveAll()"
              [disabled]="dirtyCount === 0">
        <mat-icon>save</mat-icon>
        Save All
      </button>
    </div>
  </div>

  <!-- Table wrapper -->
  <div class="table-wrapper">
    <table mat-table
           [dataSource]="dataSource"
           [trackBy]="trackByRow"
           class="generic-table">

      <!-- Dynamic Columns -->
      <ng-container *ngFor="let col of config.columns" [matColumnDef]="col.field">
        
        <!-- Header -->
        <th mat-header-cell
            *matHeaderCellDef
            [style.width]="col.width"
            [style.min-width]="col.minWidth"
            [class]="col.cssClass"
            [class.sticky-column]="col.sticky">
          {{ col.header }}
        </th>

        <!-- Cell -->
        <td mat-cell
            *matCellDef="let row; let rowIndex = index"
            [attr.rowspan]="getRowspan(col, rowIndex)"
            [class.hidden-cell]="isHidden(col, rowIndex)"
            [class.edited]="hasChanges(row)"
            [class.sticky-column]="col.sticky"
            [class]="col.cssClass">

          <!-- Editable Cell -->
          <ng-container *ngIf="col.editable; else displayCell">
            
            <!-- Text Input -->
            <input *ngIf="!col.editType || col.editType === 'text'"
                   type="text"
                   class="cell-input"
                   [value]="getCellValue(row, col)"
                   (input)="onCellEdit(row, col, $any($event.target).value)"
                   (blur)="saveEntity(row)">

            <!-- Number Input -->
            <input *ngIf="col.editType === 'number'"
                   type="number"
                   class="cell-input"
                   [value]="getCellValue(row, col)"
                   (input)="onCellEdit(row, col, +$any($event.target).value)"
                   (blur)="saveEntity(row)">

            <!-- Checkbox -->
            <input *ngIf="col.editType === 'checkbox'"
                   type="checkbox"
                   class="cell-checkbox"
                   [checked]="getCellValue(row, col)"
                   (change)="onCellEdit(row, col, $any($event.target).checked); saveEntity(row)">

            <!-- Select -->
            <select *ngIf="col.editType === 'select'"
                    class="cell-select"
                    [value]="getCellValue(row, col)"
                    (change)="onCellEdit(row, col, $any($event.target).value); saveEntity(row)">
              <option *ngFor="let opt of col.options" [value]="opt.value">
                {{ opt.label }}
              </option>
            </select>

            <!-- Date -->
            <input *ngIf="col.editType === 'date'"
                   type="date"
                   class="cell-input"
                   [value]="getCellValue(row, col)"
                   (change)="onCellEdit(row, col, $any($event.target).value); saveEntity(row)">

          </ng-container>

          <!-- Display-only Cell -->
          <ng-template #displayCell>
            <span class="cell-display">
              {{ formatValue(row, col) }}
            </span>
          </ng-template>

          <!-- Change indicator -->
          <mat-icon *ngIf="hasChanges(row) && col.type === 'base'"
                    class="change-indicator"
                    inline="true">
            edit
          </mat-icon>

        </td>

      </ng-container>

      <!-- Header Row -->
      <tr mat-header-row
          *matHeaderRowDef="displayedColumns; sticky: true"></tr>

      <!-- Data Row -->
      <tr mat-row
          *matRowDef="let row; columns: displayedColumns"
          [class.row-edited]="hasChanges(row)"
          (click)="onRowClick(row)"></tr>

    </table>
  </div>

  <!-- Paginator -->
  <mat-paginator
    [length]="totalCount"
    [pageSize]="pageSize"
    [pageSizeOptions]="[10, 20, 50, 100]"
    (page)="onPageChange($event)"
    showFirstLastButtons>
  </mat-paginator>

</div>
